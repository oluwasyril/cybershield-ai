<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberShield AI — Page Not Found</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Cpath fill='%23DC2626' fill-rule='evenodd' d='M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z' clip-rule='evenodd'/%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="text-align:center;max-width:400px;width:100%;">

    <!-- Logo -->
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:36px;">
      <div class="logo-box"><svg width="13" height="13" fill="#DC2626" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg></div>
      <span style="font-size:13px;font-weight:700;color:#fff;letter-spacing:0.04em;">CyberShield AI</span>
    </div>

    <!-- Big red 404 -->
    <div class="error-code" style="margin-bottom:16px;">404</div>

    <!-- Card -->
    <div class="auth-card" style="padding:32px;">
      <div style="font-size:9px;font-weight:700;color:var(--crimson);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;">Page not found</div>
      <h1 style="font-size:18px;font-weight:700;color:#fff;margin-bottom:10px;letter-spacing:-0.01em;">Nothing to scan here</h1>
      <p style="font-size:13px;color:var(--text-sub);line-height:1.8;margin-bottom:24px;">The page you're looking for doesn't exist or has been moved. Check the URL for mistakes and try again.</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a href="dashboard.html" class="btn-primary" style="display:block;text-decoration:none;">Back to Dashboard</a>
        <a href="index.html" class="btn-ghost" style="display:flex;text-decoration:none;">Sign In</a>
      </div>
      <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);">
        <span style="font-size:9px;color:var(--text-hint);letter-spacing:0.08em;text-transform:uppercase;">Error code</span>
        <span style="font-size:9px;color:var(--crimson);letter-spacing:0.06em;font-weight:600;font-family:monospace;">HTTP_404_NOT_FOUND</span>
      </div>
    </div>

    <!-- Footer -->
    <div style="margin-top:22px;">
      <p style="font-size:9px;color:var(--text-hint);letter-spacing:0.06em;text-transform:uppercase;">MSc Cybersecurity · University of Roehampton · 2026</p>
    </div>
  </div>
</body>
</html>
